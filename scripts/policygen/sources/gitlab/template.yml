source:
  host: {{ config.gitlab_domain | default("gitlab.com") }}
  auth: bearer_token:gitlab
  rules:
    - route: "GET /api/v4/groups"
    - route: "GET /api/v4/groups/{groupId}"
    - route: "GET /api/v4/groups/{groupId}/descendant_groups"
    - route: "GET /api/v4/groups/{groupId}/milestones"
    - route: "GET /api/v4/groups/{groupId}/members"
    - route: "GET /api/v4/groups/{groupId}/labels"
    - route: "GET /api/v4/groups/{groupId}/boards"
    - route: "GET /api/v4/groups/{groupId}/epics"
    - route: "GET /api/v4/groups/{groupId}/epics/{epicIid}/issues"
    - route: "GET /api/v4/groups/{groupId}/projects"
    - route: "GET /api/v4/projects/{projectId}/milestones"
    - route: "GET /api/v4/projects/{projectId}/members"
    - route: "GET /api/v4/projects/{projectId}/labels"
    - route: "GET /api/v4/projects/{projectId}/repository/branches"
    - route: "GET /api/v4/projects/{projectId}/releases"
    - route: "GET /api/v4/projects/{projectId}/repository/tags"
    - route: "GET /api/v4/projects/{projectId}/users"
    - route: "GET /api/v4/projects/{projectId}/deployments"
    - route: "GET /api/v4/projects/{projectId}/repository/commits"
    - route: "GET /api/v4/projects/{projectId}/issues"
    - route: "GET /api/v4/projects/{projectId}/merge_requests"
    - route: "GET /api/v4/projects/{projectId}/merge_requests/{mergeRequestIid}/commits"
    - route: "GET /api/v4/projects/{projectId}/merge_requests/{mergeRequestIid}/discussions"
    - route: "GET /api/v4/projects/{projectId}/merge_requests/{mergeRequestIid}/diffs"
    - route: "GET /api/v4/projects/{projectId}/pipelines"
    - route: "GET /api/v4/projects/{projectId}/pipelines/{pipelineId}"
    - route: "GET /api/v4/projects/{projectId}/pipelines/{pipelineId}/jobs"
    - route: "GET /api/v4/projects/{projectId}/events"
